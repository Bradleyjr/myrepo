<!doctype html><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1,viewport-fit=cover'><meta name=theme-color content='#0b0b0c'><title>ShaderPost</title><body style='margin:0;background:#0b0b0c'><script>(async()=>{try{const s=(await Promise.all(['https://raw.githubusercontent.com/Bradleyjr/myrepo/master/shaderpost/payload-1.txt','https://raw.githubusercontent.com/Bradleyjr/myrepo/master/shaderpost/payload-2.txt','https://raw.githubusercontent.com/Bradleyjr/myrepo/master/shaderpost/payload-3.txt'].map(u=>fetch(u+'?v=2').then(r=>r.text())))).join('');const b=Uint8Array.from(atob(s),c=>c.charCodeAt(0));const t=await new Response(new Blob([b]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(t);document.close()}catch(e){document.body.innerHTML='<p style="color:white;font:16px system-ui;padding:24px">ShaderPost could not load.</p>';console.error(e)}})()</script>
