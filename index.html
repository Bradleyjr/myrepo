<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b0b0c"><title>ShaderPost — Social Graphic Studio</title></head><body><div class="app-shell"><header class="topbar"><div class="brand-lockup"><div class="brand-mark" aria-hidden="true"></div><div><div class="brand-name">ShaderPost</div><div class="brand-subtitle">Procedural social graphics</div></div></div><div class="topbar-actions"><button class="button ghost" id="randomizeButton" type="button">Randomize</button> <button class="button ghost" id="resetButton" type="button">Reset</button> <button class="button primary" id="exportButton" type="button">Export PNG</button></div></header><main class="workspace"><aside class="panel sidebar left-panel" aria-label="Background controls"><section class="control-section"><div class="section-heading"><span>Canvas</span> <span class="section-index">01</span></div><label class="field-label" for="formatSelect">Format</label> <select id="formatSelect" class="select-input"><option value="portrait">Portrait · 4:5</option><option value="square">Square · 1:1</option><option value="story">Story · 9:16</option><option value="landscape">Landscape · 1.91:1</option></select></section><section class="control-section"><div class="section-heading"><span>Shader</span> <span class="section-index">02</span></div><div class="shader-grid" id="shaderGrid" role="radiogroup" aria-label="Shader background"><button class="shader-card is-active" type="button" data-shader="dither" role="radio" aria-checked="true"><span class="shader-thumb thumb-dither"></span><span>Dither field</span></button> <button class="shader-card" type="button" data-shader="fluid" role="radio" aria-checked="false"><span class="shader-thumb thumb-fluid"></span><span>Fluid gradient</span></button> <button class="shader-card" type="button" data-shader="metal" role="radio" aria-checked="false"><span class="shader-thumb thumb-metal"></span><span>Liquid metal</span></button> <button class="shader-card" type="button" data-shader="aurora" role="radio" aria-checked="false"><span class="shader-thumb thumb-aurora"></span><span>Aurora noise</span></button> <button class="shader-card" type="button" data-shader="mesh" role="radio" aria-checked="false"><span class="shader-thumb thumb-mesh"></span><span>Mesh bloom</span></button> <button class="shader-card" type="button" data-shader="halftone" role="radio" aria-checked="false"><span class="shader-thumb thumb-halftone"></span><span>Halftone pulse</span></button> <button class="shader-card" type="button" data-shader="hologram" role="radio" aria-checked="false"><span class="shader-thumb thumb-hologram"></span><span>Holographic foil</span></button> <button class="shader-card" type="button" data-shader="topography" role="radio" aria-checked="false"><span class="shader-thumb thumb-topography"></span><span>Topographic lines</span></button> <button class="shader-card" type="button" data-shader="glass" role="radio" aria-checked="false"><span class="shader-thumb thumb-glass"></span><span>Refracted glass</span></button> <button class="shader-card" type="button" data-shader="plasma" role="radio" aria-checked="false"><span class="shader-thumb thumb-plasma"></span><span>Plasma rings</span></button> <button class="shader-card" type="button" data-shader="ink" role="radio" aria-checked="false"><span class="shader-thumb thumb-ink"></span><span>Marbled ink</span></button> <button class="shader-card" type="button" data-shader="prism" role="radio" aria-checked="false"><span class="shader-thumb thumb-prism"></span><span>Prism beams</span></button></div></section><section class="control-section compact-controls"><div class="section-heading"><span>Appearance</span> <span class="section-index">03</span></div><div class="color-trio"><label class="color-control">Color A<input id="colorA" type="color" value="#ff6a3d"></label> <label class="color-control">Color B<input id="colorB" type="color" value="#5528ff"></label> <label class="color-control">Accent<input id="colorC" type="color" value="#00e5ff"></label></div><label class="range-control"><span><span>Scale</span><output id="scaleOutput">1.15</output></span><input id="scaleRange" type="range" min="0.45" max="3" step="0.01" value="1.15"></label> <label class="range-control"><span><span>Complexity</span><output id="complexityOutput">0.62</output></span><input id="complexityRange" type="range" min="0" max="1" step="0.01" value="0.62"></label> <label class="range-control"><span><span>Contrast</span><output id="contrastOutput">1.18</output></span><input id="contrastRange" type="range" min="0.6" max="2" step="0.01" value="1.18"></label> <label class="range-control"><span><span>Grain</span><output id="grainOutput">0.18</output></span><input id="grainRange" type="range" min="0" max="0.65" step="0.01" value="0.18"></label> <label class="range-control"><span><span>Motion</span><output id="motionOutput">0.38</output></span><input id="motionRange" type="range" min="0" max="1" step="0.01" value="0.38"></label> <label class="range-control"><span><span>Warp</span><output id="warpOutput">0.45</output></span><input id="warpRange" type="range" min="0" max="1" step="0.01" value="0.45"></label> <label class="range-control"><span><span>Glow</span><output id="glowOutput">0.58</output></span><input id="glowRange" type="range" min="0" max="1" step="0.01" value="0.58"></label> <label class="range-control"><span><span>Angle</span><output id="angleOutput">0°</output></span><input id="angleRange" type="range" min="-180" max="180" step="1" value="0"></label> <label class="range-control"><span><span>Seed</span><output id="seedOutput">3.30</output></span><input id="seedRange" type="range" min="0" max="10" step="0.01" value="3.30"></label><div class="inline-row"><button class="button small ghost grow" id="pauseButton" type="button">Pause motion</button> <button class="icon-button" id="shuffleShaderButton" type="button" title="Shuffle shader parameters" aria-label="Shuffle shader parameters">↻</button></div></section></aside><section class="stage" aria-label="Graphic preview"><div class="stage-toolbar"><div class="zoom-control"><button type="button" id="zoomOutButton" aria-label="Zoom out">−</button><output id="zoomOutput">58%</output><button type="button" id="zoomInButton" aria-label="Zoom in">+</button></div><div class="canvas-dimensions" id="dimensionsLabel">1080 × 1350</div></div><div class="canvas-wrap" id="canvasWrap"><canvas id="displayCanvas" width="1080" height="1350" aria-label="Social post preview"></canvas><div class="selection-frame" id="selectionFrame" aria-hidden="true"><span class="handle top-left"></span><span class="handle top-right"></span> <span class="handle bottom-left"></span><span class="handle bottom-right"></span></div></div><p class="stage-hint">Drag the text directly on the canvas. Use Text &amp; layout to edit.</p></section><nav class="mobile-panel-tabs" aria-label="Editor panels"><button type="button" class="is-active" data-mobile-panel="left-panel" aria-pressed="true">Background</button> <button type="button" data-mobile-panel="right-panel" aria-pressed="false">Text &amp; layout</button></nav><aside class="panel sidebar right-panel" aria-label="Typography controls"><section class="control-section"><div class="section-heading"><span>Content</span> <span class="section-index">04</span></div><label class="field-label" for="textInput">Text</label> <textarea id="textInput" class="textarea-input" rows="5">Design should feel alive.</textarea></section><section class="control-section compact-controls"><div class="section-heading"><span>Typography</span> <span class="section-index">05</span></div><div class="two-column"><div><label class="field-label" for="fontSelect">Typeface</label> <select id="fontSelect" class="select-input"><option value="Arial">Modern Sans</option><option value="Arial Black">Display Sans</option><option value="Georgia">Editorial Serif</option><option value="Courier New">Monospace</option><option value="Trebuchet MS">Humanist Sans</option></select></div><div><label class="field-label" for="weightSelect">Weight</label> <select id="weightSelect" class="select-input"><option value="400">Regular</option><option value="600">Semibold</option><option value="700" selected="selected">Bold</option><option value="900">Black</option></select></div></div><label class="range-control"><span><span>Size</span><output id="fontSizeOutput">112</output></span><input id="fontSizeRange" type="range" min="30" max="240" step="1" value="112"></label> <label class="range-control"><span><span>Line height</span><output id="lineHeightOutput">0.94</output></span><input id="lineHeightRange" type="range" min="0.7" max="1.5" step="0.01" value="0.94"></label> <label class="range-control"><span><span>Tracking</span><output id="trackingOutput">-3</output></span><input id="trackingRange" type="range" min="-10" max="30" step="1" value="-3"></label> <label class="range-control"><span><span>Text width</span><output id="textWidthOutput">78%</output></span><input id="textWidthRange" type="range" min="25" max="94" step="1" value="78"></label><div class="color-pair single-line"><label class="color-control">Text<input id="textColor" type="color" value="#ffffff"></label> <label class="color-control">Shadow<input id="shadowColor" type="color" value="#000000"></label></div><label class="range-control"><span><span>Shadow</span><output id="shadowOutput">0.18</output></span><input id="shadowRange" type="range" min="0" max="1" step="0.01" value="0.18"></label></section><section class="control-section compact-controls"><div class="section-heading"><span>Layout</span> <span class="section-index">06</span></div><div class="segmented-control" id="horizontalAlign" aria-label="Horizontal text alignment"><button type="button" data-value="left">Left</button> <button type="button" data-value="center" class="is-active">Center</button> <button type="button" data-value="right">Right</button></div><div class="segmented-control" id="verticalAlign" aria-label="Vertical text alignment"><button type="button" data-value="top">Top</button> <button type="button" data-value="middle" class="is-active">Middle</button> <button type="button" data-value="bottom">Bottom</button></div><label class="range-control"><span><span>Horizontal position</span><output id="xPositionOutput">50%</output></span><input id="xPositionRange" type="range" min="0" max="100" step="1" value="50"></label> <label class="range-control"><span><span>Vertical position</span><output id="yPositionOutput">50%</output></span><input id="yPositionRange" type="range" min="0" max="100" step="1" value="50"></label> <label class="range-control"><span><span>Rotation</span><output id="rotationOutput">0°</output></span><input id="rotationRange" type="range" min="-25" max="25" step="1" value="0"></label></section></aside></main></div><canvas id="shaderCanvas" width="1080" height="1350" hidden></canvas><script>(async()=>{const t="https://raw.githubusercontent.com/Bradleyjr/myrepo/master/shaderpost/";try{const[e,...o]=await Promise.all([fetch(t+"styles.css?v=3").then(t=>t.text()),...[1,2,3,4].map(e=>fetch(t+`app-${e}.txt?v=3`).then(t=>t.text()))]),n=document.createElement("style");n.textContent=e,document.head.appendChild(n),(0,eval)(o.join(""))}catch(t){console.error(t),document.body.innerHTML='<p style="color:white;font:16px system-ui;padding:24px">ShaderPost could not load.</p>'}})()</script></body></html>
