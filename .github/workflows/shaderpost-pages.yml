name: Deploy ShaderPost

on:
  push:
    branches: [master]
    paths:
      - "shaderpost/**"
      - ".github/workflows/shaderpost-pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: shaderpost-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload ShaderPost
        uses: actions/upload-pages-artifact@v3
        with:
          path: shaderpost
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Record deployment result
        if: always()
        run: |
          printf '{"status":"%s","url":"%s","commit":"%s"}\n' "${{ job.status }}" "${{ steps.deployment.outputs.page_url }}" "${{ github.sha }}" > shaderpost-deploy-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shaderpost-deploy-status.json
          git commit -m "Record ShaderPost deployment result" || exit 0
          git push
